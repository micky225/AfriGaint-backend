services:
  - type: web
    name: afrigaint-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application --workers ${WEB_CONCURRENCY:-2} --threads ${GUNICORN_THREADS:-4} --timeout ${GUNICORN_TIMEOUT:-60} --worker-tmp-dir /dev/shm --access-logfile -
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://afrigaint.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://afrigaint.com,https://www.afrigaint.com
      - key: ALLOWED_HOSTS
        value: afrigaint-backend.onrender.com,afrigaint.com,www.afrigaint.com,api.afrigaint.com
      - key: PYTHON_VERSION
        value: "3.12.0"

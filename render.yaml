services:
  - type: web
    name: afrigaint-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://afri-gaint.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://afri-gaint.vercel.app
      - key: PYTHON_VERSION
        value: "3.12.0"
